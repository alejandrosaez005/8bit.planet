<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="pagina" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Videojuegos</title>
    <link rel="stylesheet" href="pagina.css"/>
</head>
<body>

    <header>
        <h1>8bit planet</h1>
        <nav>
            <ul>
                <li><a href="#catalogo">Catálogo</a></li>
                <li><a href="#calculadora">Calculadora</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <h2>Videojuegos</h2>

    <section id="catalogo">

        <div class="juego">
            <img src=tlou.jpg alt="The last of us" class="miniatura">
            <p>The last of us - 30€</p>
        </div>

        <div class="juego">
            <img src="rdr2.jpg" alt="Red dead redemption" class="miniatura">
            <p>Red dead redemption 2- 60€</p>
        </div>

          <div class="juego">
            <img src="gow.jpg" alt="God of war" class="miniatura">
            <p>God of war- 75€</p>
        </div>

      
    </section>
    <section id="catalogo">
        <div class="juego">
            <img src="mafia.jpg" alt="Mafia" class="miniatura">
            <p>Mafia- 55€</p>
        </div>
       
        <div class="juego">
            <img src="spider.jpg" alt="Spiderman" class="miniatura">
            <p>Mafia- 35€</p>
        </div>

        <div class="juego">
            <img src="gta.jpg" alt="Grand theft auto V" class="miniatura">
            <p>Grand theft auto V- 60€</p>
        </div>
    </section>

    <section id="calculadora">
        <h2>Calculadora de Compra</h2>

        <form id="formulario">
            <label>Selecciona juego:</label>
            <select id="precio">
                <option value="30">The last of us (30€)</option>
                <option value="60">Red dead redemption 2 (60€)</option>
                <option value="75">God of war (75€)</option>
                <option value="55">Mafia (55€)</option>
                <option value="35">Marvel´s Spiderman (35€)</option>
                <option value="60">Grand theft auto V (60€)</option>
            </select>

            <label>Cantidad:</label>
            <input type="number" id="cantidad" value="1">

            <button type="submit">Calcular</button>
        </form>

        <p id="resultado"></p>
    </section>

    <section id="contacto">
        <h2>Contacto</h2>
        <form>
            <input type="text" placeholder="Nombre">
            <input type="email" placeholder="Email">
            <textarea placeholder="Mensaje"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>

    <script src="pagina.js"></script>
</body>
</html>
